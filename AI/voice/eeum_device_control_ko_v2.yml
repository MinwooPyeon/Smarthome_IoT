context:
  expressions:
    TURN_ON_DEVICE:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (좀) @켜다
      - $범위:scope $기기:device (좀) @켜다
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (좀) @켜다 @연결하다
        온도 $pv.TwoDigitInteger:tmp 도씨 (로) @설정하다
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (좀) @켜다 @연결하다
        (@바람) $세기:level (으로,로) @설정하다
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (좀) @켜다 @연결하다
        (@바람) $pv.SingleDigitInteger:step [단,단계] (으로,로) @설정하다
    TURN_OFF_DEVICE:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (좀) @끄다
      - $범위:scope $기기:device (좀) @끄다
      - $범위:scope (좀) @끄다
    SET_TEMPERATURE:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) ($기기:device) 온도
        $pv.TwoDigitInteger:tmp [도씨,도] (로) @설정하다
    SET_FAN_LEVEL:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (@바람) $세기:level
        (으로,로) @설정하다
    SET_FAN_STEP:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) ($기기:device) (@바람)
        $pv.SingleDigitInteger:step [단,단계] (으로,로) @설정하다
    QUERY_IS_ON:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device @전원_꺼짐 @존재_의문
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device 전원 (상태,상황)
        [@알려줘,@얼마야,@상태_어때]
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device @전원_켜짐 @존재_의문
    QUERY_WHERE_ON:
      - (여기서) @장소_의문 $기기:device (이,가) @전원_켜짐 [있는,있는지] [@알려줘,@얼마야,@상태_어때]
    QUERY_WHERE_ON_LOCATION:
      - $기기:device [중,들] (지금) @전원_켜짐 [있는,있는지] [곳,방,위치] [@알려줘,@얼마야,@상태_어때]
    QUERY_TEMPERATURE:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device [현재 온도, 온도]
        [@온도_의문,@상태_어때,@얼마야]
    QUERY_FAN_LEVEL:
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device (@바람) [세기,단계]
        [@정체_의문,@상태_어때,@얼마야]
    QUERY_ENERGY_USAGE:
      - (우리집) [전기,전력,에너지] [사용량,소비량] [@알려줘,@얼마야,@상태_어때]
      - ($이름:name) (이) ($호칭:kinship) $장소:place (@위치_조사) $기기:device ($기간:date)
        [전기,전력,에너지] [사용량,소비량] [@알려줘,@얼마야,@상태_어때]
      - ($이름:name) (이) ($호칭:kinship) $장소:place [전기,전력,에너지] [사용량,소비량]
        [@알려줘,@얼마야,@상태_어때]
    QUERY_WHERE_OFF:
      - (여기서) @장소_의문 $기기:device (이,가) @전원_꺼짐 [있는,있는지] [@알려줘,@얼마야,@상태_어때]
    QUERY_WHERE_OFF_LOCATION:
      - $기기:device [중,들] (지금) @전원_꺼짐 [있는,있는지] [곳,방,위치] [@알려줘,@얼마야,@상태_어때]

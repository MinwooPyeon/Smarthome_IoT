services:
  db:
    image: postgres:16-alpine
    container_name: eeum-db
    restart: always
    environment:
      POSTGRES_DB: eeum
      POSTGRES_USER: eeum
      POSTGRES_PASSWORD: eeum
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eeum -d eeum -h localhost -p 5432"]
      interval: 5s
      timeout: 3s
      retries: 30

  redis:
    image: redis:7-alpine
    container_name: eeum-redis
    restart: always
    command: ["redis-server","--appendonly","yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  eeum:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: eeum:latest
    container_name: eeum
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SERVER_PORT: "8081"
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/eeum
      SPRING_DATASOURCE_USERNAME: eeum
      SPRING_DATASOURCE_PASSWORD: eeum
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: "6379"
    expose:
      - "8081"

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: always
    depends_on:
      eeum:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
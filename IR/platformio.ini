[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32 IR Remote Controller
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DWIFI_SSID="iPhone"
    -DWIFI_PASSWORD="49555412"
    -DMQTT_BROKER="test.mosquitto.org"
    -DMQTT_PORT=1883
    -DMQTT_CLIENT_ID="esp32_ir_controller"
    -Iheader
    -Iexternal
    -std=c++17

; Libraries
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    adafruit/Adafruit NeoPixel@^1.11.0

; Upload settings (자동 감지)
; upload_port =
; monitor_port =

; Additional environments for different configurations
[env:esp32dev_debug]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DDEBUG_MODE=1
    -DVERBOSE_LOGGING=1

[env:esp32dev_release]
extends = env:esp32dev
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DWIFI_SSID="${sysenv.WIFI_SSID}"
    -DWIFI_PASSWORD="${sysenv.WIFI_PASSWORD}"
    -DMQTT_BROKER="${sysenv.MQTT_BROKER}"
    -DMQTT_PORT=${sysenv.MQTT_PORT:1883}
    -DMQTT_CLIENT_ID="${sysenv.MQTT_CLIENT_ID:esp32_ir_controller}"
    -DRELEASE_MODE=1

; Native testing environment for unit tests
[env:native]
platform = native
build_flags =
    -DPLATFORM_WINDOWS
    -DDEBUG_MODE=1
    -DVERBOSE_LOGGING=1
lib_deps =
    google/googletest@^1.14.0
    nlohmann/json@^3.11.2
test_framework = googletest
test_filter = *

; ESP32 IR Remote Controller
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DWIFI_SSID=\"iPhone\"
    -DWIFI_PASSWORD=\"49555412\"
    -DMQTT_BROKER=\"43.201.62.254\"
    -DMQTT_PORT=8883
    -DMQTT_CLIENT_ID=\"esp32_ir_controller\"
    -DMQTT_USERNAME=\"eeum\"
    -DMQTT_PASSWORD=\"ssafy2086eeum\"
    -DMQTT_USE_SSL=1

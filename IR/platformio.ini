[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; ESP32 IR Remote Controller
board_build.partitions = default.csv
board_build.filesystem = spiffs

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=5
    -DWIFI_SSID=\"iPhone\"
    -DWIFI_PASSWORD=\"49555412\"
    -DMQTT_BROKER=\"localhost\"
    -DMQTT_PORT=1883
    -DMQTT_CLIENT_ID=\"esp32_ir_controller\"
    -DMQTT_USERNAME=\"\"
    -DMQTT_PASSWORD=\"\"
    -DMQTT_USE_TLS=0
    -Iheader
    -std=c++17

; Arduino libraries for MQTT and IR
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^6.21.3
    crankyoldgit/IRremoteESP8266@^2.8.6

; Upload settings (자동 감지)
; upload_port =
; monitor_port =

; Additional environments for different configurations
[env:esp32dev_debug]
extends = env:esp32dev
build_flags =
    ${env:esp32dev.build_flags}
    -DDEBUG_MODE=1
    -DVERBOSE_LOGGING=1
